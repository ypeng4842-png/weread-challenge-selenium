name: 微信读书自动打卡阅读 (双容器矩阵版)

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间早上 9 点准时进入列队 (UTC 01:00)
    - cron: '0 1 * * *'

jobs:
  run-challenge:
    runs-on: ubuntu-latest
    # 物理级熔断：最大运行 120 分钟（2小时）后强制安全下线，防风控死循环
    timeout-minutes: 120
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 启动双容器阵列
        env:
          # 直接将 Secret 映射到当前 Shell 环境变量
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
          WEREAD_SELECTION: -1
        run: |
          # 放弃生成 .env 文件，直接通过 docker compose 的 --env-file 之外的方式或环境变量传递
          # 这里我们使用 docker compose run 来强制覆盖环境变量
          docker compose run --rm \
            -e WEREAD_COOKIE="$WEREAD_COOKIE" \
            -e WEREAD_SELECTION="$WEREAD_SELECTION" \
            app
