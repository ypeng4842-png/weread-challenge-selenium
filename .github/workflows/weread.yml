name: 微信读书自动打卡阅读 (双容器矩阵版)

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间早上 9 点准时进入列队 (UTC 01:00)
    - cron: '0 1 * * *'

jobs:
  run-challenge:
    runs-on: ubuntu-latest
    # 物理级熔断：最大运行 120 分钟（2小时）后强制安全下线，防风控死循环
    timeout-minutes: 120
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 启动双容器阵列
        env:
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: |
          # 1. 将 Secrets 里的钥匙写入当前目录的 .env 文件
          # 注意：不要加单引号，直接注入原始字符串
          echo "WEREAD_COOKIE=${WEREAD_COOKIE}" > .env
          echo "WEREAD_SELECTION=-1" >> .env
          
          # 2. 启动阵列。Docker 会自动读取 .env 并填入我们刚才在手册里留的插槽
          docker compose up --build --abort-on-container-exit
