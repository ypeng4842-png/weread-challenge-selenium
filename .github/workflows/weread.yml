name: 微信读书自动打卡阅读 (Docker版)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 启动 Docker 集装箱打卡
        env:
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
          WEREAD_SELECTION: -1
        # 逻辑：利用项目自带的 Dockerfile 自动构建并运行
        run: |
          docker build -t weread-image .
          docker run --rm \
            -e WEREAD_COOKIE="$WEREAD_COOKIE" \
            -e WEREAD_SELECTION="$WEREAD_SELECTION" \
            weread-image
