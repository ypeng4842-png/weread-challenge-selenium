name: 微信读书自动打卡阅读

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 安装 Chrome 浏览器及其依赖 # 新增：确保云端有浏览器可用
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安装依赖
        run: npm install

      - name: 执行打卡脚本
        env:
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
          WEREAD_SELECTION: -1
          # 强制开启“无头模式”，解决云端无显示器导致的崩溃
          NODE_OPTIONS: "--max-old-space-size=4096" 
        run: node src/weread-challenge.js
