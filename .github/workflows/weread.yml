name: 微信读书自动打卡阅读 (明文烧录版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  run-challenge:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 物理级明文烧录并点火
        env:
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: |
          # 核心修复：去掉了 EOF 的单引号，利用底层强制将 Cookie 文本刻印进文件
          # 双保险：同时注入 WEREAD_COOKIE 和 WEREAD_COOKIES 应对不同版本的底层读取
          cat << EOF > docker-compose.yml
          services:
            app:
              image: jqknono/weread-challenge:latest
              environment:
                - WEREAD_REMOTE_BROWSER=http://selenium:4444
                - WEREAD_SELECTION=-1
                - WEREAD_DURATION=120
                - "WEREAD_COOKIE=${WEREAD_COOKIE}"
                - "WEREAD_COOKIES=${WEREAD_COOKIE}"
              depends_on:
                selenium:
                  condition: service_healthy
            selenium:
              image: selenium/standalone-chromium:latest
              shm_size: 2gb
              environment:
                - SE_ENABLE_TRACING=false
                - SE_BIND_HOST=false
              healthcheck:
                test: ["CMD", "curl", "-f", "http://selenium:4444/status"]
                interval: 5s
                timeout: 60s
                retries: 10
          EOF
          
          # 终极点火
          docker compose up --abort-on-container-exit
