name: 微信读书自动打卡阅读

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # 每天北京时间早上 9 点

jobs:
  run-challenge:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 启动双容器阵列
        env:
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: |
          echo "WEREAD_COOKIE=${WEREAD_COOKIE}" > .env
          echo "WEREAD_SELECTION=-1" >> .env
          echo "WEREAD_DURATION=120" >> .env
          
          docker compose up --build --abort-on-container-exit
          echo "=========================================="
          echo "=== 探针阶段 4: 正式点火执行 ==="
          echo "=========================================="
          docker compose up --build --abort-on-container-exit
