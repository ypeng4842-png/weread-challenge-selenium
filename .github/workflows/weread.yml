name: 微信读书自动打卡阅读 (终极注入版)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # 北京时间每天早上 09:00

jobs:
  run-challenge:
    runs-on: ubuntu-latest
    timeout-minutes: 130 # 留出 10 分钟冗余，确保能跑满 120 分钟
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 启动双容器阵列 (暴力注入模式)
        env:
          # 此处必须与你 GitHub Secrets 里的名称完全一致
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: |
          # 放弃所有 .env 中间文件，直接通过命令行参数注入
          docker compose run --rm \
            -e WEREAD_COOKIE="$WEREAD_COOKIE" \
            -e WEREAD_SELECTION="-1" \
            -e WEREAD_DURATION="120" \
            app
