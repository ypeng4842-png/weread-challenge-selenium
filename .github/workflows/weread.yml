name: 微信读书自动打卡阅读 (双容器矩阵版)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

jobs:
  run-challenge:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 启动双容器阵列
        env:
          WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
        run: |
          # 动态生成环境变量文件供 Docker 阵列读取
          echo "WEREAD_COOKIE=$WEREAD_COOKIE" > .env
          echo "WEREAD_SELECTION=-1" >> .env
          
          # 唤醒 docker-compose 阵列
          docker-compose up --build --abort-on-container-exit
