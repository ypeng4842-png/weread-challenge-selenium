services:
  app:
    image: jqknono/weread-challenge:latest
    pull_policy: always
    environment:
      - WEREAD_REMOTE_BROWSER=http://selenium:4444
      # 修正 1：将阅读时长改为你要求的 120 分钟
      - WEREAD_DURATION=120 
      # 修正 2：建立映射桥梁，让容器能读取到我们在 Secret 里存的钥匙
      - WEREAD_COOKIE=${WEREAD_COOKIE}
      - WEREAD_SELECTION=${WEREAD_SELECTION}
    volumes:
      - ./data:/app/data
    depends_on:
      selenium:
        condition: service_healthy
    dns:
      - 223.5.5.5
  selenium:
    image: selenium/standalone-chromium:latest
    pull_policy: if_not_present
    shm_size: 2gb
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SE_ENABLE_TRACING=false
      - SE_BIND_HOST=false
      - SE_JAVA_DISABLE_HOSTNAME_VERIFICATION=false
    dns:
      - 223.5.5.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://selenium:4444/status"]
      interval: 5s
      timeout: 60s
      retries: 10
